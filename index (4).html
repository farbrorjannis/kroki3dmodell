<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Mannequin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050505; overflow: hidden; font-family: sans-serif; color: white; }
  #ui {
    position: absolute; top: 0; left: 0; width: 100%;
    background: rgba(20,20,20,0.9);
    display: flex; gap: 10px; padding: 12px 16px; z-index: 100;
  }
  .btn {
    background: #333; color: white; border: 1px solid #555;
    padding: 8px 18px; cursor: pointer; border-radius: 4px; font-size: 13px;
  }
  .btn:hover { background: #555; }
  #status {
    position: absolute; bottom: 12px; left: 12px;
    font-size: 11px; color: #888; z-index: 100;
  }
  #loader {
    position: absolute; inset: 0; background: #000;
    display: flex; align-items: center; justify-content: center;
    z-index: 200; font-size: 16px; font-weight: bold; color: orange;
  }
</style>
</head>
<body>

<div id="ui">
  <button class="btn" onclick="loadModel('xbot')">MALE</button>
  <button class="btn" onclick="loadModel('ybot')">FEMALE</button>
  <button class="btn" onclick="setPose('stand')">STAND</button>
  <button class="btn" onclick="setPose('sit')">SIT</button>
</div>
<div id="loader">LOADING...</div>
<div id="status">Initializing...</div>
<canvas id="canvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
  var BASE   = 'https://farbrorjannis.github.io/kroki3dmodell/';
  var MODELS = { xbot: BASE + 'xbot.glb', ybot: BASE + 'ybot.glb' };

  var canvas   = document.getElementById('canvas');
  var loaderEl = document.getElementById('loader');
  var statusEl = document.getElementById('status');

  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050505);

  var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 10000);

  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);

  scene.add(new THREE.AmbientLight(0xffffff, 1.0));
  var dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
  dirLight.position.set(5, 10, 7);
  scene.add(dirLight);

  var grid = new THREE.GridHelper(500, 50, 0x333333, 0x222222);
  scene.add(grid);

  var currentModel   = null;
  var bones          = {};
  var defaultBoneRot = {};
  var rotY           = 0;
  var isDragging     = false;
  var lastX          = 0;
  var camDist        = 400;  // start large, will be set after load
  var camTarget      = new THREE.Vector3(0, 80, 0);

  function loadModel(type) {
    loaderEl.style.display = 'flex';
    if (currentModel) scene.remove(currentModel);
    bones = {};
    defaultBoneRot = {};
    currentModel = null;

    var gltfLoader = new THREE.GLTFLoader();
    gltfLoader.load(
      MODELS[type],
      function(gltf) {
        currentModel = gltf.scene;
        scene.add(currentModel);

        // Compute bounding box in native units (no scaling)
        var box    = new THREE.Box3().setFromObject(currentModel);
        var size   = new THREE.Vector3();
        var center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        // Center horizontally, feet on y=0
        currentModel.position.x = -center.x;
        currentModel.position.y = -box.min.y;
        currentModel.position.z = -center.z;

        // Recompute after repositioning
        box.setFromObject(currentModel);
        box.getSize(size);

        var modelHeight = size.y;

        // Camera: 3x the height back, looking at middle of model
        camDist   = modelHeight * 3;
        camTarget.set(0, modelHeight * 0.5, 0);

        // Place grid at feet
        grid.position.y = 0;

        // Collect bones
        currentModel.traverse(function(node) {
          if (node.isBone) {
            bones[node.name] = node;
            defaultBoneRot[node.name] = node.rotation.clone();
          }
        });

        setPose('stand');
        loaderEl.style.display = 'none';
        statusEl.textContent = 'Loaded: ' + type + ' | height: ' + Math.round(modelHeight) + ' units | bones: ' + Object.keys(bones).length;
      },
      function(xhr) {
        if (xhr.total > 0) {
          var pct = Math.round((xhr.loaded / xhr.total) * 100);
          statusEl.textContent = 'Loading: ' + pct + '%';
        }
      },
      function(err) {
        loaderEl.style.display = 'none';
        statusEl.textContent = 'Error: ' + (err.message || 'Failed to load');
        console.error(err);
      }
    );
  }

  function resetBones() {
    Object.keys(bones).forEach(function(name) {
      bones[name].rotation.copy(defaultBoneRot[name]);
    });
  }

  function setPose(name) {
    if (!currentModel) return;
    resetBones();
    if (name === 'stand') {
      setBone('mixamorigLeftArm',  'z', -1.3);
      setBone('mixamorigRightArm', 'z',  1.3);
    }
    if (name === 'sit') {
      setBone('mixamorigLeftUpLeg',  'x', -1.5);
      setBone('mixamorigRightUpLeg', 'x', -1.5);
      setBone('mixamorigLeftLeg',    'x',  1.4);
      setBone('mixamorigRightLeg',   'x',  1.4);
    }
  }

  function setBone(name, axis, value) {
    if (bones[name]) bones[name].rotation[axis] = value;
  }

  canvas.addEventListener('pointerdown', function(e) { isDragging = true; lastX = e.clientX; });
  canvas.addEventListener('pointermove', function(e) {
    if (!isDragging) return;
    rotY -= (e.clientX - lastX) * 0.01;
    lastX = e.clientX;
  });
  canvas.addEventListener('pointerup',    function() { isDragging = false; });
  canvas.addEventListener('pointerleave', function() { isDragging = false; });

  canvas.addEventListener('wheel', function(e) {
    camDist += e.deltaY * 0.5;
    camDist = Math.max(50, camDist);
  });

  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  function animate() {
    requestAnimationFrame(animate);
    camera.position.x = camDist * Math.sin(rotY);
    camera.position.z = camDist * Math.cos(rotY);
    camera.position.y = camTarget.y;
    camera.lookAt(camTarget);
    renderer.render(scene, camera);
  }

  animate();
  loadModel('xbot');
</script>
</body>
</html>
