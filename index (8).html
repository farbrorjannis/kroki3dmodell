<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3D Artist Mannequin</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a0a;--panel:rgba(12,10,6,0.96);--border:#2a2a2a;
  --ochre:#c07d2b;--ochre-l:#f0e0c0;--light:#aaa;--cream:#f5f0e8;
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Inter',system-ui,sans-serif;color:var(--cream);display:flex;flex-direction:column;}

/* ── TOP BAR ── */
#topbar{
  background:rgba(18,12,4,0.97);border-bottom:1px solid var(--border);
  padding:.45rem .8rem;display:flex;align-items:center;gap:.5rem;
  flex-shrink:0;z-index:10;flex-wrap:wrap;
}
#topbar h1{
  font-size:.9rem;font-weight:700;color:var(--ochre-l);
  white-space:nowrap;flex-shrink:0;letter-spacing:.03em;
}
.sep{width:1px;height:18px;background:var(--border);flex-shrink:0;}

/* Pose selector */
#poseSelect{
  background:#1a1208;color:var(--cream);border:1px solid var(--border);
  border-radius:6px;padding:.28rem .5rem;font-size:.72rem;
  cursor:pointer;outline:none;flex:1;min-width:160px;max-width:260px;
}
#poseSelect:focus{border-color:var(--ochre);}

/* Action buttons */
.act-btns{display:flex;gap:.3rem;flex-shrink:0;}
.act-btn{
  padding:.28rem .6rem;border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--light);
  font-size:.68rem;font-weight:600;cursor:pointer;transition:all .15s;
  white-space:nowrap;
}
.act-btn:hover{border-color:var(--ochre);color:var(--ochre);}
.act-btn.on{background:rgba(192,125,43,.15);border-color:var(--ochre);color:var(--ochre);}

/* ── MAIN ── */
#main{flex:1;position:relative;overflow:hidden;min-height:0;}
canvas{width:100%;height:100%;display:block;cursor:grab;}
canvas.grabbing{cursor:grabbing;}

/* Light panel */
#light-panel{
  position:absolute;right:.6rem;top:.6rem;
  background:rgba(12,8,2,.97);border:1px solid var(--border);
  border-radius:10px;padding:.7rem .8rem;min-width:165px;
  display:none;z-index:15;
}
#light-panel.open{display:block;}
.lp-title{font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;
  color:var(--ochre);font-weight:700;margin-bottom:.5rem;}
.lp-row{margin-bottom:.4rem;}
.lp-label{display:flex;justify-content:space-between;font-size:.62rem;
  color:var(--light);margin-bottom:.12rem;}
input[type=range]{
  -webkit-appearance:none;width:100%;height:3px;
  background:var(--border);border-radius:3px;outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;
  background:var(--ochre);border-radius:50%;cursor:pointer;
}

/* Hint */
#hint{
  position:absolute;bottom:.7rem;left:50%;transform:translateX(-50%);
  background:rgba(10,6,0,.85);border:1px solid var(--border);
  color:var(--light);font-size:.65rem;padding:.28rem .8rem;
  border-radius:20px;pointer-events:none;white-space:nowrap;transition:opacity 1.5s;
}

@media(max-width:540px){
  #topbar{padding:.35rem .5rem;gap:.35rem;}
  #topbar h1{font-size:.78rem;}
  .act-btn{padding:.22rem .45rem;font-size:.62rem;}
  #poseSelect{font-size:.68rem;}
}
</style>
</head>
<body>

<div id="topbar">
  <h1>3D Mannequin</h1>
  <div class="sep"></div>
  <select id="poseSelect"></select>
  <div class="sep"></div>
  <div class="act-btns">
    <button class="act-btn" id="btnLight" onclick="toggleLight()">💡 Light</button>
    <button class="act-btn" id="btnWire"  onclick="toggleWire()">◻ Wire</button>
    <button class="act-btn" id="btnBg"    onclick="toggleBg()">☀ BG</button>
    <button class="act-btn" id="btnGrid"  onclick="toggleGrid()">⊞ Grid</button>
    <button class="act-btn"               onclick="saveSnap()">⬇ Save</button>
  </div>
</div>

<div id="main">
  <canvas id="c"></canvas>
  <div id="hint">Drag to rotate · Scroll to zoom · Right-drag to pan</div>
  <div id="light-panel">
    <div class="lp-title">Lighting</div>
    <div class="lp-row">
      <div class="lp-label"><span>Key</span><span id="v-key">80%</span></div>
      <input type="range" min="0" max="200" value="80" oninput="setL('key',this.value)">
    </div>
    <div class="lp-row">
      <div class="lp-label"><span>Fill</span><span id="v-fill">40%</span></div>
      <input type="range" min="0" max="200" value="40" oninput="setL('fill',this.value)">
    </div>
    <div class="lp-row">
      <div class="lp-label"><span>Rim</span><span id="v-rim">60%</span></div>

    </div>
    <div class="lp-row">
      <div class="lp-label"><span>Ambient</span><span id="v-amb">25%</span></div>
      <input type="range" min="0" max="100" value="25" oninput="setL('amb',this.value)">
    </div>
    <div class="lp-row">
      <div class="lp-label"><span>Shadows</span><span id="v-shd">on</span></div>
      <input type="range" min="0" max="1" value="1" step="1" oninput="setL('shd',this.value)">
    </div>
  </div>
</div>

// ── THREE.JS SETUP ────────────────────────────────────────────────────────────

// ── BUILD MANNEQUIN ───────────────────────────────────────────────────────────
const MAT = new THREE.MeshStandardMaterial({
  color:0xe8dfd0, roughness:0.55, metalness:0.05,
  emissive:0x110e0a, emissiveIntensity:0.15
});
const JOINT_MAT = new THREE.MeshStandardMaterial({
  color:0x5a4a38, roughness:0.6, metalness:0.1
});

function box(w,h,d){ return new THREE.BoxGeometry(w,h,d); }
function cyl(r,h,s=14){ return new THREE.CylinderGeometry(r,r,h,s); }
function sph(r,s=14){ return new THREE.SphereGeometry(r,s,s); }

function part(geo, mat, x,y,z){
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x,y,z);
  m.castShadow = m.receiveShadow = true;
  return m;
}

function joint(r, x,y,z){
  return part(sph(r), JOINT_MAT, x,y,z);
}

// Pivot groups (rotation applied here)
const joints = {};
function pivot(name, parent, x,y,z){
  const g = new THREE.Group();
  g.position.set(x,y,z);
  parent.add(g);
  joints[name] = g;
  return g;
}

const root = new THREE.Group();
root.position.y = 0; // feet on ground
scene.add(root);

// ── POSE SYSTEM ───────────────────────────────────────────────────────────────
// Map pose keys to joint names
const KEY_MAP = {
  hips:'hips', chest:'chest', neck:'neck', head:'head',
  lShoulder:'lShoulder', lElbow:'lElbow', lWrist:'lWrist',
  rShoulder:'rShoulder', rElbow:'rElbow', rWrist:'rWrist',
  lHip:'lHip', lKnee:'lKnee', lAnkle:'lAnkle',
  rHip:'rHip', rKnee:'rKnee', rAnkle:'rAnkle',
};

function applyPose(name){
  // Reset all
  Object.values(joints).forEach(g => g.rotation.set(0,0,0));
  const pose = POSES[name] || {};
  for(const [key, rot] of Object.entries(pose)){
    const jname = KEY_MAP[key];
    if(jname && joints[jname]){
      joints[jname].rotation.x = rot.x || 0;
      joints[jname].rotation.y = rot.y || 0;
      joints[jname].rotation.z = rot.z || 0;
    }
  }
}

// ── POPULATE DROPDOWN ─────────────────────────────────────────────────────────
const sel = document.getElementById('poseSelect');

// Group poses
const groups = {
  'Neutral':     ['T-Pose','Standing','At Ease','Contrapposto','Hand on Hip','Arms Crossed'],
  'Locomotion':  ['Walking','Running','Sprinting','Sneaking'],

for(const [grp, names] of Object.entries(groups)){

sel.value = 'Standing';

// ── ORBIT CAMERA ──────────────────────────────────────────────────────────────
let orb  = {theta:0, phi:0.08, r:3.2, ty:0.95};
let drag = {on:false, x:0, y:0, t0:0, p0:0, btn:0, tx:0};

function updateCamera(){
  camera.position.set(
    orb.r * Math.sin(orb.theta) * Math.cos(orb.phi),
    orb.ty + orb.r * Math.sin(orb.phi),
    orb.r * Math.cos(orb.theta) * Math.cos(orb.phi)
  );
  camera.lookAt(0, orb.ty, 0);
}

canvas.addEventListener('mousedown', e => {
  drag = {on:true, x:e.clientX, y:e.clientY, t0:orb.theta, p0:orb.phi, btn:e.button, tx:orb.ty};
  canvas.classList.add('grabbing');
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if(!drag.on) return;
  const dx = (e.clientX - drag.x) / canvas.clientWidth;
  const dy = (e.clientY - drag.y) / canvas.clientHeight;
  if(drag.btn === 2){
    orb.ty = Math.max(-0.5, Math.min(2.5, drag.tx + dy * orb.r * 1.5));
  } else {
    orb.theta = drag.t0 - dx * Math.PI * 2;
    orb.phi   = Math.max(-0.3, Math.min(1.3, drag.p0 + dy * Math.PI));
  }
  updateCamera();
});
window.addEventListener('mouseup', () => { drag.on=false; canvas.classList.remove('grabbing'); });
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  orb.r = Math.max(0.8, Math.min(9, orb.r + e.deltaY * 0.004));
  updateCamera();
}, {passive:false});

// Touch
let t0s = null, pinch0=0, r0=0, th0=0, ph0=0, ty0=0;
canvas.addEventListener('touchstart', e => {
  if(e.touches.length===1){
    t0s={x:e.touches[0].clientX, y:e.touches[0].clientY};
    th0=orb.theta; ph0=orb.phi; ty0=orb.ty;
  } else if(e.touches.length===2){
    pinch0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    r0=orb.r;
  }
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchmove', e => {
  if(e.touches.length===1 && t0s){
    const dx=(e.touches[0].clientX-t0s.x)/canvas.clientWidth;
    const dy=(e.touches[0].clientY-t0s.y)/canvas.clientHeight;
    orb.theta=th0-dx*Math.PI*2;
    orb.phi=Math.max(-0.3,Math.min(1.3,ph0+dy*Math.PI));
    updateCamera();
  } else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    orb.r=Math.max(0.8,Math.min(9,r0*(pinch0/d)));
    updateCamera();
  }
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend', ()=>{ t0s=null; });

// ── ACTIONS ───────────────────────────────────────────────────────────────────
let wireOn=false, bgLight=false, gridOn=true;

function toggleLight(){
  const p=document.getElementById('light-panel');
  p.classList.toggle('open');
  document.getElementById('btnLight').classList.toggle('on',p.classList.contains('open'));
}
function setL(t,v){
  v=parseFloat(v);
  if(t==='key')  { keyLight.intensity =v/100; document.getElementById('v-key').textContent =v+'%'; }
  if(t==='fill') { fillLight.intensity=v/100; document.getElementById('v-fill').textContent=v+'%'; }
  if(t==='rim')  { rimLight.intensity =v/100; document.getElementById('v-rim').textContent =v+'%'; }
  if(t==='amb')  { ambLight.intensity =v/100; document.getElementById('v-amb').textContent =v+'%'; }
  if(t==='shd')  {
    renderer.shadowMap.enabled=v>0;
    document.getElementById('v-shd').textContent=v>0?'on':'off';
    scene.traverse(c=>{ if(c.material) c.material.needsUpdate=true; });
  }
}
function toggleWire(){
  wireOn=!wireOn;
  document.getElementById('btnWire').classList.toggle('on',wireOn);
  scene.traverse(c=>{
    if(!c.isMesh) return;
    if(wireOn){
      c.userData._m=c.material;
      c.material=new THREE.MeshBasicMaterial({wireframe:true,color:0x8aaa66});
    } else {
      if(c.userData._m) c.material=c.userData._m;
    }
  });
}
function toggleBg(){
  bgLight=!bgLight;
  document.getElementById('btnBg').classList.toggle('on',bgLight);
  const col=bgLight?0xddd8d0:0x0a0806;
  scene.background=new THREE.Color(col);
  scene.fog=new THREE.Fog(col,8,20);
  groundMesh.material.color.set(bgLight?0xc8c0b8:0x100c08);
  ambLight.intensity=bgLight?0.7:0.25;
}
function toggleGrid(){
  gridOn=!gridOn;
  grid.visible=gridOn;
  document.getElementById('btnGrid').classList.toggle('on',!gridOn);
}
function saveSnap(){
  renderer.render(scene,camera);
  canvas.toBlob(blob=>{
    const a=document.createElement('a');
    a.download='mannequin-'+sel.value.replace(/\s/g,'-')+'.png';
    a.href=URL.createObjectURL(blob);
    a.click();
  });
}

// ── RESIZE & RENDER ───────────────────────────────────────────────────────────
function resize(){
  const w=canvas.clientWidth, h=canvas.clientHeight;
  renderer.setSize(w,h,false);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
}
function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
new ResizeObserver(resize).observe(canvas);
resize();
updateCamera();
animate();

setTimeout(()=>{ document.getElementById('hint').style.opacity='0'; },5000);
