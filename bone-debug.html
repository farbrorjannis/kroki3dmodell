<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bone Debug – Mannequin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a1208;color:#f0e0c0;font-family:monospace;font-size:13px;display:flex;height:100vh;}
#left{width:340px;flex-shrink:0;overflow-y:auto;padding:1rem;border-right:1px solid #3d2d1a;}
#right{flex:1;position:relative;}
canvas{width:100%;height:100%;}
h2{color:#c07d2b;font-size:.85rem;margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.1em;}
.btn{display:inline-block;padding:.3rem .8rem;background:#2c1f10;border:1px solid #c07d2b;color:#f0e0c0;cursor:pointer;border-radius:4px;margin:.2rem .2rem .2rem 0;font-family:monospace;font-size:.75rem;}
.btn:hover{background:#c07d2b;color:#2c1f10;}
.btn.active{background:#c07d2b;color:#2c1f10;}
#boneList{margin-top:.5rem;max-height:60vh;overflow-y:auto;}
.bone-item{padding:.2rem .3rem;border-bottom:1px solid #2c1f10;color:#c4a882;cursor:pointer;}
.bone-item:hover{background:#2c1f10;color:#f0e0c0;}
.bone-item.highlight{background:#3d2d1a;color:#c07d2b;}
#status{margin-top:.5rem;padding:.4rem;background:#2c1f10;border-radius:4px;color:#8aaa66;font-size:.75rem;line-height:1.5;}
#error{color:#ff8888;margin-top:.3rem;font-size:.75rem;}
.section{margin-bottom:1rem;}
</style>
</head>
<body>
<div id="left">
  <div class="section">
    <h2>Models</h2>
    <button class="btn active" onclick="load('xbot')">X Bot</button>
    <button class="btn" onclick="load('ybot')">Y Bot</button>
  </div>
  <div class="section">
    <h2>Status</h2>
    <div id="status">Loading...</div>
    <div id="error"></div>
  </div>
  <div class="section">
    <h2>Bone names found</h2>
    <div id="boneCount" style="color:#c07d2b;font-size:.75rem;margin-bottom:.3rem;"></div>
    <div id="boneList"></div>
  </div>
</div>
<div id="right">
  <canvas id="c"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
const URLS = {
  xbot: 'https://farbrorjannis.github.io/kroki3dmodell/xbot.glb',
  ybot: 'https://farbrorjannis.github.io/kroki3dmodell/ybot.glb',
};

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1208);

const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 20);
camera.position.set(0, 1, 3.5);
camera.lookAt(0, 1, 0);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dl = new THREE.DirectionalLight(0xffffff, 1.2);
dl.position.set(2, 4, 3);
scene.add(dl);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(6,6),
  new THREE.MeshStandardMaterial({color:0x0e0904})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);
scene.add(new THREE.GridHelper(4,16,0x3d2d1a,0x261a09));

let model = null;
const loader = new THREE.GLTFLoader();

function setStatus(msg, isError=false) {
  document.getElementById('status').textContent = msg;
  if (isError) document.getElementById('error').textContent = '⚠ ' + msg;
  else document.getElementById('error').textContent = '';
}

function load(key) {
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  const activeBtn = document.querySelector(`.btn[onclick="load('${key}')"]`);
  if (activeBtn) activeBtn.classList.add('active');
  setStatus('Loading ' + key + '...');
  document.getElementById('boneList').innerHTML = '';
  document.getElementById('boneCount').textContent = '';

  if (model) { scene.remove(model); model = null; }

  loader.load(URLS[key],
    (gltf) => {
      model = gltf.scene;

      // Scale to 1.75m
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const scale = 1.75 / size.y;
      model.scale.setScalar(scale);
      const center = box.getCenter(new THREE.Vector3());
      model.position.x = -center.x * scale;
      model.position.z = -center.z * scale;
      model.position.y = -box.min.y * scale;

      scene.add(model);

      // Collect all bone names
      const boneNames = [];
      const objectTypes = {};

      model.traverse(child => {
        const type = child.type || 'unknown';
        objectTypes[type] = (objectTypes[type]||0) + 1;

        if (child.isBone) boneNames.push({name: child.name, type: 'Bone'});
        if (child.isSkinnedMesh && child.skeleton) {
          child.skeleton.bones.forEach(b => {
            if (!boneNames.find(x=>x.name===b.name))
              boneNames.push({name:b.name, type:'SkeletonBone'});
          });
        }
      });

      // Show results
      const typeStr = Object.entries(objectTypes).map(([k,v])=>`${k}:${v}`).join(', ');
      setStatus(`✓ Loaded! Objects: ${typeStr}`);
      document.getElementById('boneCount').textContent = `${boneNames.length} bones found:`;

      const list = document.getElementById('boneList');
      if (boneNames.length === 0) {
        list.innerHTML = '<div style="color:#ff8888;padding:.3rem">No bones found! Model may not be rigged.</div>';
      } else {
        boneNames.forEach(b => {
          const div = document.createElement('div');
          div.className = 'bone-item';
          div.textContent = b.name + ' (' + b.type + ')';
          // Highlight likely key bones
          const lc = b.name.toLowerCase();
          if (lc.includes('hip') || lc.includes('spine') || lc.includes('head') ||
              lc.includes('arm') || lc.includes('leg') || lc.includes('shoulder')) {
            div.classList.add('highlight');
          }
          list.appendChild(div);
        });
      }
    },
    (prog) => {
      if (prog.total > 0) setStatus('Loading... ' + Math.round(prog.loaded/prog.total*100) + '%');
    },
    (err) => {
      setStatus('Error: ' + err.message, true);
      console.error(err);
    }
  );
}

// Orbit
let drag = {on:false, x:0, y:0};
let orb = {theta:0, phi:0.1, r:3.5};
function updateCam() {
  camera.position.set(
    orb.r*Math.sin(orb.theta)*Math.cos(orb.phi),
    1 + orb.r*Math.sin(orb.phi),
    orb.r*Math.cos(orb.theta)*Math.cos(orb.phi)
  );
  camera.lookAt(0, 1, 0);
}
canvas.addEventListener('mousedown', e=>{drag={on:true,x:e.clientX,y:e.clientY,t:orb.theta,p:orb.phi};});
window.addEventListener('mousemove', e=>{
  if(!drag.on) return;
  orb.theta = drag.t - (e.clientX-drag.x)/canvas.clientWidth*Math.PI*2;
  orb.phi = Math.max(-0.2,Math.min(1,(drag.p+(e.clientY-drag.y)/canvas.clientHeight*Math.PI)));
  updateCam();
});
window.addEventListener('mouseup',()=>drag.on=false);
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  orb.r=Math.max(1,Math.min(6,orb.r+e.deltaY*0.003));
  updateCam();
},{passive:false});

function resize() {
  const w=canvas.clientWidth,h=canvas.clientHeight;
  renderer.setSize(w,h,false);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
}
new ResizeObserver(resize).observe(canvas);
resize(); updateCam();
requestAnimationFrame(function loop(){requestAnimationFrame(loop);renderer.render(scene,camera);});

// Auto-load xbot
load('xbot');
</script>
</body>
</html>
