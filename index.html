<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3D Mannequin – Art Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--dark:#2c1f10;--mid:#6b4c2a;--light:#c4a882;--ochre:#c07d2b;--ochre-l:#f0e0c0;--cream:#faf8f3;--border:#3d2d1a;}
html,body{height:100%;overflow:hidden;background:#111;font-family:'Lato',sans-serif;color:var(--cream);}
body{display:flex;flex-direction:column;}
#topbar{background:var(--dark);border-bottom:1px solid var(--border);padding:.5rem .9rem;display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;z-index:10;}
#topbar h1{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--ochre-l);font-weight:500;}
.sep{width:1px;height:20px;background:var(--border);}
.btn-group{display:flex;gap:.3rem;}
.btn{padding:.3rem .6rem;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--light);font-size:.65rem;font-weight:700;cursor:pointer;text-transform:uppercase;transition:0.2s;}
.btn:hover, .btn.active{border-color:var(--ochre);color:var(--ochre);}
.btn.active{background:var(--ochre);color:var(--dark);}
#main{flex:1;position:relative;background:#000;}
#viewport{width:100%;height:100%;cursor:grab;}
#loading{position:absolute;inset:0;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;}
#loading.hidden{display:none;}
.spinner{width:40px;height:40px;border:3px solid #333;border-top-color:var(--ochre);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--mid);pointer-events:none;}
</style>
</head>
<body>

<div id="topbar">
  <h1>3D Mannequin</h1>
  <div class="sep"></div>
  <div class="btn-group">
    <button class="btn active" id="m-xbot" onclick="switchModel('xbot')">♂ X Bot</button>
    <button class="btn" id="m-ybot" onclick="switchModel('ybot')">♀ Y Bot</button>
  </div>
  <div class="sep"></div>
  <div class="btn-group" id="poseBtns"></div>
  <div class="sep"></div>
  <div class="btn-group">
    <button class="btn" onclick="toggleWire()">◻ Wire</button>
    <button class="btn" onclick="toggleBg()">☀ BG</button>
    <button class="btn" onclick="saveSnap()">⬇ Save</button>
  </div>
</div>

<div id="main">
  <canvas id="viewport"></canvas>
  <div id="loading"><div class="spinner"></div><p style="margin-top:10px; font-size:12px;">Calibrating model...</p></div>
  <div id="hint">Left Click: Rotate | Scroll: Zoom | Right Click: Pan</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
const MODELS = { 
  xbot: 'https://farbrorjannis.github.io/kroki3dmodell/xbot.glb', 
  ybot: 'https://farbrorjannis.github.io/kroki3dmodell/ybot.glb' 
};

const B = { 
  hips:'mixamorigHips', spine:'mixamorigSpine', neck:'mixamorigNeck', 
  lArm:'mixamorigLeftArm', rArm:'mixamorigRightArm', 
  lUpLeg:'mixamorigLeftUpLeg', rUpLeg:'mixamorigRightUpLeg', 
  lLeg:'mixamorigLeftLeg', rLeg:'mixamorigRightLeg' 
};

const POSES = { 
  'T-Pose': {}, 
  'Standing': {[B.lArm]:{z:-1.2}, [B.rArm]:{z:1.2}}, 
  'Sitting': {[B.lUpLeg]:{x:-1.5}, [B.rUpLeg]:{x:-1.5}, [B.lLeg]:{x:1.5}, [B.rLeg]:{x:1.5}, [B.hips]:{y:-0.5, z:0.2}},
  'Crouching': {[B.lUpLeg]:{x:-2}, [B.rUpLeg]:{x:-2}, [B.lLeg]:{x:2.2}, [B.rLeg]:{x:2.2}, [B.hips]:{y:-0.8}}
};

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x151008);
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 1.2, 4);

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('viewport'), antialias:true, preserveDrawingBuffer:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dl = new THREE.DirectionalLight(0xffffff, 0.8); dl.position.set(2, 4, 3); dl.castShadow = true; scene.add(dl);

const ground = new THREE.Mesh(new THREE.PlaneGeometry(20,20), new THREE.MeshStandardMaterial({color:0x222222}));
ground.rotation.x = -Math.PI/2; ground.receiveShadow = true; scene.add(ground);
const grid = new THREE.GridHelper(10, 20, 0x444444, 0x222222); scene.add(grid);

let model, bones = {}, curPose = 'Standing', isWire = false;
const loader = new THREE.GLTFLoader();

function loadModel(id) {
  document.getElementById('loading').classList.remove('hidden');
  if(model) scene.remove(model);
  bones = {};

  loader.load(MODELS[id], (gltf) => {
    model = gltf.scene;

    model.rotation.set(0,0,0);
    model.updateMatrixWorld(true);

    model.traverse(n => {
      if(n.isBone) bones[n.name] = n;
      if(n.isMesh) { 
        n.castShadow = n.receiveShadow = true; 
        n.material.side = THREE.DoubleSide;
        n.userData.origMat = n.material;
      }
    });

    model.rotateX(-Math.PI / 2);
    model.updateMatrixWorld(true);

    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    
    const s = 1.8 / size.y;
    model.scale.setScalar(s);
    
    model.updateMatrixWorld(true);
    const finalBox = new THREE.Box3().setFromObject(model);
    model.position.y = -finalBox.min.y;

    scene.add(model);
    applyPose(curPose);
    document.getElementById('loading').classList.add('hidden');
  });
}

function applyPose(name) {
  curPose = name;
  Object.values(bones).forEach(b => b.rotation.set(0,0,0));
  const p = POSES[name] || {};
  for(let b in p) {
    if(bones[b]) {
      if(p[b].x) bones[b].rotation.x = p[b].x;
      if(p[b].y) bones[b].rotation.y = p[b].y;
      if(p[b].z) bones[b].rotation.z = p[b].z;
    }
  }
  document.querySelectorAll('.pose-btn').forEach(b => b.classList.toggle('active', b.innerText === name));
}

function switchModel(id) {
  document.getElementById('m-xbot').classList.toggle('active', id==='xbot');
  document.getElementById('m-ybot').classList.toggle('active', id==='ybot');
  loadModel(id);
}

const pDiv = document.getElementById('poseBtns');
Object.keys(POSES).forEach(k => {
  const b = document.createElement('button'); b.className='btn pose-btn'; b.innerText=k; b.onclick=()=>applyPose(k); pDiv.appendChild(b);
});

let theta=0, phi=0.2, radius=4, drag=false;
const canvas = document.getElementById('viewport');
canvas.onmousedown = (e) => { if(e.button===0) drag=true; };
window.onmouseup = () => drag=false;
window.onmousemove = (e) => { if(drag){ theta -= e.movementX*0.01; phi = Math.max(-0.4, Math.min(1.2, phi + e.movementY*0.01)); updateCam(); }};
canvas.onwheel = (e) => { radius = Math.max(1, Math.min(10, radius + e.deltaY*0.005)); updateCam(); };

function updateCam() {
  camera.position.set(radius*Math.sin(theta)*Math.cos(phi), radius*Math.sin(phi)+1, radius*Math.cos(theta)*Math.cos(phi));
  camera.lookAt(0, 1, 0);
}

function toggleWire() { isWire=!isWire; model.traverse(n=>{if(n.isMesh) n.material = isWire?new THREE.MeshBasicMaterial({wireframe:true, color:0x00ff00}):n.userData.origMat;});}
function toggleBg() { scene.background = scene.background.getHex()===0x151008?new THREE.Color(0xdddddd):new THREE.Color(0x151008); }
function saveSnap() { renderer.render(scene, camera); const a=document.createElement('a'); a.href=canvas.toDataURL(); a.download='pose.png'; a.click(); }

window.onresize = () => { camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
function anim() { requestAnimationFrame(anim); renderer.render(scene, camera); }
updateCam(); anim(); loadModel('xbot');
</script>
</body>
</html>
