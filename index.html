<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3D Mannequin Final</title>
<style>
    body { margin: 0; padding: 0; overflow: hidden; background: #050505; font-family: sans-serif; }
    #ui { position: absolute; top: 0; left: 0; width: 100%; background: #1a1a1a; display: flex; gap: 10px; padding: 10px; z-index: 100; border-bottom: 1px solid #333; }
    .btn { background: #333; color: white; border: 1px solid #444; padding: 6px 12px; cursor: pointer; font-size: 12px; text-transform: uppercase; border-radius: 4px; }
    .btn:hover { background: #444; border-color: #666; }
    .btn.active { background: #c07d2b; border-color: #f0e0c0; color: #000; }
    #loader { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; color: #c07d2b; }
    .spinner { width: 40px; height: 40px; border: 4px solid #222; border-top: 4px solid #c07d2b; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="ui">
    <button class="btn active" id="btn-x" onclick="changeModel('xbot')">Male Bot</button>
    <button class="btn" id="btn-y" onclick="changeModel('ybot')">Female Bot</button>
    <div style="width:1px; background:#444; margin:0 10px;"></div>
    <div id="pose-container" style="display:flex; gap:5px;"></div>
    <button class="btn" style="margin-left:auto" onclick="takeSnapshot()">Save PNG</button>
</div>

<div id="loader"><div class="spinner"></div><p>Calculating Geometry...</p></div>
<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
const CONFIG = {
    xbot: 'https://farbrorjannis.github.io/kroki3dmodell/xbot.glb',
    ybot: 'https://farbrorjannis.github.io/kroki3dmodell/ybot.glb'
};

const B = { 
    hips: 'mixamorigHips', spine: 'mixamorigSpine', 
    lA: 'mixamorigLeftArm', rA: 'mixamorigRightArm',
    lUL: 'mixamorigLeftUpLeg', rUL: 'mixamorigRightUpLeg',
    lL: 'mixamorigLeftLeg', rL: 'mixamorigRightLeg'
};

const POSES = {
    'Reset': {},
    'Stand': { [B.lA]:{z:-1.2}, [B.rA]:{z:1.2} },
    'Sit': { [B.lUL]:{x:-1.5}, [B.rUL]:{x:-1.5}, [B.lL]:{x:1.5}, [B.rL]:{x:1.5}, [B.hips]:{y:-0.5, z:0.3} },
    'Crouch': { [B.lUL]:{x:-2}, [B.rUL]:{x:-2}, [B.lL]:{x:2.2}, [B.rL]:{x:2.2}, [B.hips]:{y:-0.8} }
};

let scene, camera, renderer, model, bones = {}, currentPose = 'Stand';
const loader = new THREE.GLTFLoader();

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0a);

    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.5, 5);

    renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dLight.position.set(5, 10, 7.5);
    dLight.castShadow = true;
    scene.add(dLight);

    const grid = new THREE.GridHelper(20, 40, 0x222222, 0x111111);
    scene.add(grid);

    // Build Pose Buttons
    const pContainer = document.getElementById('pose-container');
    Object.keys(POSES).forEach(name => {
        const b = document.createElement('button');
        b.className = 'btn pose-btn';
        b.innerText = name;
        b.onclick = () => applyPose(name);
        pContainer.appendChild(b);
    });

    loadModel('xbot');
    animate();
}

function loadModel(type) {
    document.getElementById('loader').style.display = 'flex';
    if (model) scene.remove(model);
    bones = {};

    loader.load(CONFIG[type], (gltf) => {
        model = gltf.scene;

        // 1. FORCE NEUTRAL STATE
        model.rotation.set(0, 0, 0);
        model.scale.set(1, 1, 1);
        model.position.set(0, 0, 0);
        model.updateMatrixWorld(true);

        model.traverse(child => {
            if (child.isBone) bones[child.name] = child;
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });

        // 2. CORRECT ORIENTATION (Mixamo fix)
        model.rotateX(-Math.PI / 2);
        model.updateMatrixWorld(true);

        // 3. MEASURE HEIGHT (Bounding Box)
        const bbox = new THREE.Box3().setFromObject(model);
        const actualHeight = bbox.max.y - bbox.min.y;

        // 4. SCALE TO HUMAN (1.8m)
        const scaleFactor = 1.8 / actualHeight;
        model.scale.setScalar(scaleFactor);
        model.updateMatrixWorld(true);

        // 5. GROUND THE FEET
        const groundedBox = new THREE.Box3().setFromObject(model);
        model.position.y = -groundedBox.min.y;

        scene.add(model);
        applyPose(currentPose);
        document.getElementById('loader').style.display = 'none';
        
        document.getElementById('btn-x').classList.toggle('active', type === 'xbot');
        document.getElementById('btn-y').classList.toggle('active', type === 'ybot');
    });
}

function applyPose(name) {
    currentPose = name;
    Object.values(bones).forEach(b => b.rotation.set(0, 0, 0));
    const p = POSES[name];
    for (let boneID in p) {
        if (bones[boneID]) {
            if (p[boneID].x) bones[boneID].rotation.x = p[pID].x; // Typo fix here:
            if (p[boneID].x) bones[boneID].rotation.x = p[boneID].x;
            if (p[boneID].y) bones[boneID].rotation.y = p[boneID].y;
            if (p[boneID].z) bones[boneID].rotation.z = p[boneID].z;
        }
    }
    document.querySelectorAll('.pose-btn').forEach(btn => {
        btn.classList.toggle('active', btn.innerText === name);
    });
}

// Orbit Logic (Pure JS)
let lon = 0, lat = 0, phi = 0, theta = 0, isUserInteracting = false, onPointerDownPointerX = 0, onPointerDownPointerY = 0, onPointerDownLon = 0, onPointerDownLat = 0;

window.addEventListener('pointerdown', (e) => {
    isUserInteracting = true;
    onPointerDownPointerX = e.clientX;
    onPointerDownPointerY = e.clientY;
    onPointerDownLon = lon;
    onPointerDownLat = lat;
});

window.addEventListener('pointermove', (e) => {
    if (isUserInteracting) {
        lon = (onPointerDownPointerX - e.clientX) * 0.1 + onPointerDownLon;
        lat = (e.clientY - onPointerDownPointerY) * 0.1 + onPointerDownLat;
    }
});

window.addEventListener('pointerup', () => isUserInteracting = false);
window.addEventListener('wheel', (e) => {
    camera.position.z += e.deltaY * 0.01;
    camera.position.z = Math.max(1, Math.min(10, camera.position.z));
});

function animate() {
    requestAnimationFrame(animate);
    lat = Math.max(-85, Math.min(85, lat));
    phi = THREE.MathUtils.degToRad(90 - lat);
    theta = THREE.MathUtils.degToRad(lon);

    camera.position.x = 5 * Math.sin(phi) * Math.cos(theta);
    camera.position.y = 5 * Math.cos(phi) + 1;
    camera.position.z = 5 * Math.sin(phi) * Math.sin(theta);
    camera.lookAt(0, 1, 0);

    renderer.render(scene, camera);
}

function takeSnapshot() {
    const link = document.createElement('a');
    link.download = 'pose.png';
    link.href = document.getElementById('c').toDataURL('image/png');
    link.click();
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

init();
</script>
</body>
</html>
