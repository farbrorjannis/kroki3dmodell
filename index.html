<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3D Mannequin – Konstlabbet</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--dark:#2c1f10;--mid:#6b4c2a;--light:#c4a882;--ochre:#c07d2b;--ochre-l:#f0e0c0;--cream:#faf8f3;--border:#3d2d1a;}
html,body{height:100%;overflow:hidden;background:#111;font-family:'Lato',sans-serif;color:var(--cream);}
body{display:flex;flex-direction:column;}
#topbar{background:var(--dark);border-bottom:1px solid var(--border);padding:.5rem .9rem;display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;z-index:10;}
#topbar h1{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--ochre-l);font-weight:500;}
.sep{width:1px;height:20px;background:var(--border);}
.model-btns, .pose-btns, .act-btns{display:flex;gap:.3rem;}
.btn{padding:.3rem .6rem;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--light);font-size:.65rem;font-weight:700;cursor:pointer;text-transform:uppercase;}
.btn:hover, .btn.active{border-color:var(--ochre);color:var(--ochre);}
.btn.active{background:var(--ochre);color:var(--dark);}
#main{flex:1;position:relative;background:#000;}
#viewport{width:100%;height:100%;cursor:grab;}
#loading{position:absolute;inset:0;background:rgba(0,0,0,0.8);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;}
#loading.hidden{display:none;}
.spinner{width:40px;height:40px;border:3px solid #333;border-top-color:var(--ochre);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#light-panel{position:absolute;right:10px;top:10px;background:rgba(20,15,10,0.95);padding:15px;border-radius:8px;border:1px solid var(--border);display:none;font-size:12px;}
#light-panel.open{display:block;}
</style>
</head>
<body>

<div id="topbar">
  <h1>3D Mannequin</h1>
  <div class="sep"></div>
  <div class="model-btns">
    <button class="btn active" id="btn-xbot" onclick="switchModel('xbot')">♂ X Bot</button>
    <button class="btn" id="btn-ybot" onclick="switchModel('ybot')">♀ Y Bot</button>
  </div>
  <div class="sep"></div>
  <div class="pose-btns" id="poseBtns"></div>
  <div class="sep"></div>
  <div class="act-btns">
    <button class="btn" onclick="toggleLight()">💡 Light</button>
    <button class="btn" id="btnWire" onclick="toggleWire()">◻ Wire</button>
    <button class="btn" onclick="toggleBg()">☀ BG</button>
    <button class="btn" onclick="saveSnap()">⬇ Save</button>
  </div>
</div>

<div id="main">
  <canvas id="viewport"></canvas>
  <div id="loading"><div class="spinner"></div><p style="margin-top:10px">Laddar modell...</p></div>
  <div id="light-panel" id="lp">
    Key: <input type="range" min="0" max="200" value="100" oninput="setL('k',this.value)"><br>
    Fill: <input type="range" min="0" max="200" value="50" oninput="setL('f',this.value)">
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
const URLS = { xbot: 'https://farbrorjannis.github.io/kroki3dmodell/xbot.glb', ybot: 'https://farbrorjannis.github.io/kroki3dmodell/ybot.glb' };
const B = { hips:'mixamorigHips', spine:'mixamorigSpine', neck:'mixamorigNeck', lArm:'mixamorigLeftArm', rArm:'mixamorigRightArm', lUpLeg:'mixamorigLeftUpLeg', rUpLeg:'mixamorigRightUpLeg', lLeg:'mixamorigLeftLeg', rLeg:'mixamorigRightLeg' };
const POSES = { 
  'T-Pose': {}, 
  'Standing': {[B.lArm]:{z:-1.2}, [B.rArm]:{z:1.2}}, 
  'Sitting': {[B.lUpLeg]:{x:-1.5}, [B.rUpLeg]:{x:-1.5}, [B.lLeg]:{x:1.5}, [B.rLeg]:{x:1.5}, [B.hips]:{y:-0.5}},
  'Crouch': {[B.lUpLeg]:{x:-2}, [B.rUpLeg]:{x:-2}, [B.lLeg]:{x:2.2}, [B.rLeg]:{x:2.2}, [B.hips]:{y:-0.8}}
};

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x151008);
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 5);
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('viewport'), antialias:true, preserveDrawingBuffer:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;

const keyL = new THREE.DirectionalLight(0xffffff, 1); keyL.position.set(2,4,3); keyL.castShadow=true;
const fillL = new THREE.DirectionalLight(0xffffff, 0.5); fillL.position.set(-2,1,2);
scene.add(new THREE.AmbientLight(0xffffff, 0.4), keyL, fillL);

const grid = new THREE.GridHelper(10, 20, 0x444444, 0x222222); scene.add(grid);
const ground = new THREE.Mesh(new THREE.PlaneGeometry(20,20), new THREE.MeshStandardMaterial({color:0x222222}));
ground.rotation.x = -Math.PI/2; ground.receiveShadow = true; scene.add(ground);

let model, bones = {}, curPose = 'Standing', wire = false;
const loader = new THREE.GLTFLoader();

function loadModel(id) {
  document.getElementById('loading').classList.remove('hidden');
  if(model) scene.remove(model);
  bones = {};

  loader.load(URLS[id], (gltf) => {
    model = gltf.scene;
    
    // 1. NOLLSTÄLL ALLT FÖRST
    model.rotation.set(0,0,0);
    model.scale.set(1,1,1);
    model.position.set(0,0,0);

    model.traverse(n => {
      if(n.isBone) bones[n.name] = n;
      if(n.isMesh) { 
        n.castShadow = n.receiveShadow = true; 
        n.material.side = THREE.DoubleSide;
        n.userData.oldMat = n.material;
      }
    });

    // 2. MÄT MODELLEN NÄR DEN LIGGER NER (GLB-Standard)
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    
    // 3. SKALA BASERAT PÅ LÄNGDEN (som är 'z' eller 'y' beroende på export)
    const height = Math.max(size.y, size.z);
    const s = 1.8 / height;
    model.scale.setScalar(s);

    // 4. ROTERA UPP DEN
    model.rotateX(-Math.PI / 2);

    // 5. POSITIONERA PÅ MARKEN
    const finalBox = new THREE.Box3().setFromObject(model);
    model.position.y = -finalBox.min.y;

    scene.add(model);
    applyPose(curPose);
    document.getElementById('loading').classList.add('hidden');
  });
}

function applyPose(n) {
  curPose = n;
  Object.values(bones).forEach(b => b.rotation.set(0,0,0));
  const p = POSES[n] || {};
  for(let b in p) if(bones[b]) { 
    if(p[b].x) bones[b].rotation.x = p[b].x;
    if(p[b].y) bones[b].rotation.y = p[b].y;
    if(p[b].z) bones[b].rotation.z = p[b].z;
  }
  document.querySelectorAll('.pose-btn').forEach(btn => btn.classList.toggle('active', btn.innerText === n));
}

function switchModel(id) {
  document.getElementById('btn-xbot').classList.toggle('active', id==='xbot');
  document.getElementById('btn-ybot').classList.toggle('active', id==='ybot');
  loadModel(id);
}

// Skapa knappar
const pDiv = document.getElementById('poseBtns');
Object.keys(POSES).forEach(k => {
  const b = document.createElement('button'); b.className='btn pose-btn'; b.innerText=k; b.onclick=()=>applyPose(k); pDiv.appendChild(b);
});

// Kamera-styrning
let rot=0, phi=0.2, dist=4, drag=false;
canvas = document.getElementById('viewport');
canvas.onmousedown = () => drag=true;
window.onmouseup = () => drag=false;
window.onmousemove = (e) => { if(drag){ rot -= e.movementX*0.01; phi = Math.max(-0.5, Math.min(1, phi + e.movementY*0.01)); updateCam(); }};
canvas.onwheel = (e) => { dist = Math.max(1, Math.min(10, dist + e.deltaY*0.005)); updateCam(); };

function updateCam() {
  camera.position.set(dist*Math.sin(rot)*Math.cos(phi), dist*Math.sin(phi)+1, dist*Math.cos(rot)*Math.cos(phi));
  camera.lookAt(0, 1, 0);
}

function toggleLight() { const p = document.getElementById('light-panel'); p.style.display = p.style.display==='block'?'none':'block'; }
function setL(t,v) { if(t==='k') keyL.intensity=v/100; else fillL.intensity=v/100; }
function toggleWire() { wire=!wire; model.traverse(n=>{if(n.isMesh) n.material = wire?new THREE.MeshBasicMaterial({wireframe:true, color:0x00ff00}):n.userData.oldMat;});}
function toggleBg() { scene.background = scene.background.getHex()===0x151008?new THREE.Color(0xdddddd):new THREE.Color(0x151008); }
function saveSnap() { renderer.render(scene, camera); const a=document.createElement('a'); a.href=canvas.toDataURL(); a.download='pose.png'; a.click(); }

window.onresize = () => { camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
function anim() { requestAnimationFrame(anim); renderer.render(scene, camera); }
updateCam(); anim(); loadModel('xbot');
</script>
</body>
</html>
