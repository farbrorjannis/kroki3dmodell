<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Mannequin - Final Debug</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; color: white; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; background: rgba(20,20,20,0.9); display: flex; gap: 10px; padding: 15px; z-index: 100; }
        .btn { background: #333; color: white; border: 1px solid #555; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
        .btn:hover { background: #444; }
        #status { position: absolute; bottom: 20px; left: 20px; font-size: 12px; color: #888; z-index: 100; }
        #loader { position: absolute; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 200; font-weight: bold; color: orange; }
    </style>
</head>
<body>

<div id="ui">
    <button class="btn" onclick="changeModel('xbot')">MALE</button>
    <button class="btn" onclick="changeModel('ybot')">FEMALE</button>
    <button class="btn" onclick="applyPose('Stand')">STAND</button>
    <button class="btn" onclick="applyPose('Sit')">SIT</button>
</div>

<div id="status">Status: Initializing...</div>
<div id="loader" id="l-text">LOADING 3D ENGINE...</div>
<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// VIKTIGT: Kontrollera att dessa adresser stämmer med ditt GitHub-namn
const CONFIG = {
    xbot: 'https://farbrorjannis.github.io/kroki3dmodell/xbot.glb',
    ybot: 'https://farbrorjannis.github.io/kroki3dmodell/ybot.glb'
};

let scene, camera, renderer, model, bones = {};
const status = document.getElementById('status');

function init() {
    try {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 4);

        renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        scene.add(new THREE.AmbientLight(0xffffff, 1));
        scene.add(new THREE.GridHelper(10, 20, 0x333333, 0x222222));

        status.innerText = "Status: Engine Ready. Loading Model...";
        changeModel('xbot');
        animate();
    } catch (e) {
        status.innerText = "Error during init: " + e.message;
    }
}

function changeModel(type) {
    document.getElementById('loader').style.display = 'flex';
    if (model) scene.remove(model);
    
    const loader = new THREE.GLTFLoader();
    loader.load(CONFIG[type], 
        (gltf) => {
            model = gltf.scene;
            model.scale.setScalar(0.01); 
            model.rotateX(-Math.PI / 2);
            
            bones = {};
            model.traverse(child => { if (child.isBone) bones[child.name] = child; });

            scene.add(model);
            applyPose('Stand');
            
            document.getElementById('loader').style.display = 'none';
            status.innerText = "Status: Model " + type + " loaded successfully.";
        },
        (xhr) => {
            let percent = Math.round((xhr.loaded / xhr.total) * 100);
            status.innerText = "Status: Downloading " + percent + "%";
        },
        (error) => {
            status.innerText = "Status: LOAD ERROR - " + error.message;
            console.error(error);
        }
    );
}

function applyPose(name) {
    if (!model) return;
    // Nollställ alla ben
    Object.values(bones).forEach(b => b.rotation.set(0, 0, 0));
    
    const h = 'mixamorigHips', la = 'mixamorigLeftArm', ra = 'mixamorigRightArm';
    
    if (name === 'Stand') {
        if(bones[la]) bones[la].rotation.z = -1.3;
        if(bones[ra]) bones[ra].rotation.z = 1.3;
    } else if (name === 'Sit') {
        const lul = 'mixamorigLeftUpLeg', rul = 'mixamorigRightUpLeg';
        if(bones[lul]) bones[lul].rotation.x = -1.5;
        if(bones[rul]) bones[rul].rotation.x = -1.5;
        if(bones[h]) bones[h].position.y = -50; // Flytta ner höften i sitta
    }
}

let rot = 0;
window.addEventListener('pointermove', (e) => {
    if (e.buttons === 1) rot -= e.movementX * 0.01;
});

function animate() {
    requestAnimationFrame(animate);
    camera.position.x = 4 * Math.sin(rot);
    camera.position.z = 4 * Math.cos(rot);
    camera.lookAt(0, 1, 0);
    renderer.render(scene, camera);
}

window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};

init();
</script>
</body>
</html>
