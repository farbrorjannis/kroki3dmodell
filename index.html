<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Mannequin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050505; overflow: hidden; font-family: sans-serif; color: white; }

  #ui {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    background: rgba(20,20,20,0.9);
    display: flex;
    gap: 10px;
    padding: 12px 16px;
    z-index: 100;
  }

  .btn {
    background: #333;
    color: white;
    border: 1px solid #555;
    padding: 8px 18px;
    cursor: pointer;
    border-radius: 4px;
    font-size: 13px;
  }
  .btn:hover { background: #555; }

  #status {
    position: absolute;
    bottom: 12px; left: 12px;
    font-size: 11px;
    color: #888;
    z-index: 100;
  }

  #loader {
    position: absolute;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    font-size: 16px;
    font-weight: bold;
    color: orange;
  }
</style>
</head>
<body>

<div id="ui">
  <button class="btn" onclick="loadModel('xbot')">MALE</button>
  <button class="btn" onclick="loadModel('ybot')">FEMALE</button>
  <button class="btn" onclick="setPose('stand')">STAND</button>
  <button class="btn" onclick="setPose('sit')">SIT</button>
</div>

<div id="loader">LOADING...</div>
<div id="status">Initializing...</div>

<canvas id="canvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
  var BASE   = 'https://farbrorjannis.github.io/kroki3dmodell/';
  var MODELS = { xbot: BASE + 'xbot.glb', ybot: BASE + 'ybot.glb' };

  var canvas   = document.getElementById('canvas');
  var loader   = document.getElementById('loader');
  var statusEl = document.getElementById('status');

  var scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050505);

  var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 1.6, 4);

  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);

  scene.add(new THREE.AmbientLight(0xffffff, 0.8));
  var dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
  dirLight.position.set(2, 4, 3);
  scene.add(dirLight);
  scene.add(new THREE.GridHelper(10, 20, 0x333333, 0x222222));

  var currentModel = null;
  var bones = {};
  var rotY = 0;
  var isDragging = false;
  var lastX = 0;

  function loadModel(type) {
    loader.style.display = 'flex';
    if (currentModel) scene.remove(currentModel);
    bones = {};
    currentModel = null;

    var gltfLoader = new THREE.GLTFLoader();
    gltfLoader.load(
      MODELS[type],
      function(gltf) {
        currentModel = gltf.scene;
        currentModel.scale.set(0.01, 0.01, 0.01);
        currentModel.rotation.x = -Math.PI / 2;

        currentModel.traverse(function(node) {
          if (node.isBone) bones[node.name] = node;
        });

        scene.add(currentModel);
        setPose('stand');
        loader.style.display = 'none';
        statusEl.textContent = 'Loaded: ' + type;
      },
      function(xhr) {
        if (xhr.total > 0) {
          var pct = Math.round((xhr.loaded / xhr.total) * 100);
          statusEl.textContent = 'Loading: ' + pct + '%';
        }
      },
      function(err) {
        loader.style.display = 'none';
        statusEl.textContent = 'Error: ' + (err.message || 'Could not load model');
        console.error('GLTFLoader error:', err);
      }
    );
  }

  function setPose(name) {
    if (!currentModel) return;

    Object.keys(bones).forEach(function(key) {
      bones[key].rotation.set(0, 0, 0);
      bones[key].position.set(0, 0, 0);
    });

    if (name === 'stand') {
      if (bones['mixamorigLeftArm'])  bones['mixamorigLeftArm'].rotation.z  = -1.3;
      if (bones['mixamorigRightArm']) bones['mixamorigRightArm'].rotation.z =  1.3;
    }

    if (name === 'sit') {
      if (bones['mixamorigLeftUpLeg'])  bones['mixamorigLeftUpLeg'].rotation.x  = -1.5;
      if (bones['mixamorigRightUpLeg']) bones['mixamorigRightUpLeg'].rotation.x = -1.5;
      if (bones['mixamorigLeftLeg'])    bones['mixamorigLeftLeg'].rotation.x    =  1.4;
      if (bones['mixamorigRightLeg'])   bones['mixamorigRightLeg'].rotation.x   =  1.4;
      if (bones['mixamorigHips'])       bones['mixamorigHips'].position.y       = -50;
    }
  }

  canvas.addEventListener('pointerdown', function(e) {
    isDragging = true;
    lastX = e.clientX;
  });
  canvas.addEventListener('pointermove', function(e) {
    if (!isDragging) return;
    rotY -= (e.clientX - lastX) * 0.01;
    lastX = e.clientX;
  });
  canvas.addEventListener('pointerup',    function() { isDragging = false; });
  canvas.addEventListener('pointerleave', function() { isDragging = false; });

  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  function animate() {
    requestAnimationFrame(animate);
    camera.position.x = 4 * Math.sin(rotY);
    camera.position.z = 4 * Math.cos(rotY);
    camera.lookAt(0, 1, 0);
    renderer.render(scene, camera);
  }

  animate();
  loadModel('xbot');
</script>
</body>
</html>
