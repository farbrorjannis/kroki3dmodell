<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3D Artist Mannequin – Konstlabbet</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --dark:#2c1f10;--mid:#6b4c2a;--light:#c4a882;
  --ochre:#c07d2b;--ochre-l:#f0e0c0;--cream:#faf8f3;
  --border:#3d2d1a;--panel:#1e1509;
}
html,body{height:100%;overflow:hidden;background:#111;}
body{font-family:'Lato',sans-serif;color:var(--cream);display:flex;flex-direction:column;}

#topbar{
  background:var(--dark);border-bottom:1px solid var(--border);
  padding:.5rem .9rem;display:flex;align-items:center;gap:.7rem;
  flex-wrap:wrap;flex-shrink:0;z-index:10;
}
#topbar h1{
  font-family:'Playfair Display',serif;font-size:.95rem;
  color:var(--ochre-l);font-weight:500;white-space:nowrap;flex-shrink:0;
}
.sep{width:1px;height:20px;background:var(--border);flex-shrink:0;}

.model-btns{display:flex;gap:.3rem;}
.model-btn{
  display:flex;flex-direction:column;align-items:center;gap:.15rem;
  padding:.3rem .55rem;border:1px solid var(--border);border-radius:7px;
  background:transparent;color:var(--light);font-family:'Lato',sans-serif;
  font-size:.62rem;font-weight:700;cursor:pointer;transition:all .15s;
  text-transform:uppercase;letter-spacing:.04em;
}
.model-btn .icon{font-size:1.1rem;line-height:1;}
.model-btn:hover{border-color:var(--ochre);color:var(--ochre);}
.model-btn.active{background:var(--ochre);border-color:var(--ochre);color:var(--dark);}

.pose-btns{display:flex;gap:.25rem;flex-wrap:wrap;flex:1;}
.pose-btn{
  padding:.28rem .65rem;border:1px solid var(--border);border-radius:20px;
  background:transparent;color:var(--light);font-family:'Lato',sans-serif;
  font-size:.68rem;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;
}
.pose-btn:hover{border-color:var(--ochre);color:var(--ochre);}
.pose-btn.active{background:var(--ochre);border-color:var(--ochre);color:var(--dark);}

.act-btns{display:flex;gap:.3rem;flex-shrink:0;}
.act-btn{
  padding:.28rem .65rem;border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--light);font-family:'Lato',sans-serif;
  font-size:.68rem;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;
}
.act-btn:hover{border-color:var(--ochre);color:var(--ochre);}
.act-btn.on{background:rgba(192,125,43,.2);border-color:var(--ochre);color:var(--ochre);}

#main{flex:1;position:relative;overflow:hidden;min-height:0;}
#viewport{width:100%;height:100%;cursor:grab;}
#viewport.grabbing{cursor:grabbing;}

#loading{
  position:absolute;inset:0;background:rgba(28,18,6,.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1rem;z-index:20;transition:opacity .4s;
}
#loading.hidden{opacity:0;pointer-events:none;}
.spinner{
  width:44px;height:44px;border:3px solid var(--border);
  border-top-color:var(--ochre);border-radius:50%;
  animation:spin .9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
#load-msg{color:var(--light);font-size:.85rem;letter-spacing:.05em;}
#load-bar-wrap{width:180px;height:3px;background:var(--border);border-radius:3px;}
#load-bar{height:100%;background:var(--ochre);border-radius:3px;width:0%;transition:width .3s;}

#light-panel{
  position:absolute;right:.7rem;top:.7rem;
  background:rgba(30,21,9,.92);border:1px solid var(--border);
  border-radius:8px;padding:.7rem .8rem;min-width:170px;
  display:none;z-index:15;
}
#light-panel.open{display:block;}
.lp-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ochre);font-weight:700;margin-bottom:.5rem;}
.lp-row{margin-bottom:.4rem;}
.lp-label{display:flex;justify-content:space-between;font-size:.65rem;color:var(--light);margin-bottom:.15rem;}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:var(--border);border-radius:3px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;background:var(--ochre);border-radius:50%;cursor:pointer;}

@media(max-width:600px){ .pose-btns{display:none;} }
</style>
</head>
<body>

<div id="topbar">
  <h1>3D Mannequin</h1>
  <div class="sep"></div>
  <div class="model-btns">
    <button class="model-btn active" onclick="switchModel('xbot',this)">
      <span class="icon">♂</span>X Bot
    </button>
    <button class="model-btn" onclick="switchModel('ybot',this)">
      <span class="icon">♀</span>Y Bot
    </button>
  </div>
  <div class="sep"></div>
  <div class="pose-btns" id="poseBtns"></div>
  <div class="sep"></div>
  <div class="act-btns">
    <button class="act-btn" id="btnLight" onclick="toggleLightPanel()">💡 Light</button>
    <button class="act-btn" id="btnWire" onclick="toggleWire()">◻ Wire</button>
    <button class="act-btn" id="btnBg" onclick="toggleBg()">☀ BG</button>
    <button class="act-btn" id="btnGrid" onclick="toggleGrid()">⊞ Grid</button>
    <button class="act-btn" onclick="saveSnap()">⬇ Save</button>
  </div>
</div>

<div id="main">
  <canvas id="viewport"></canvas>
  <div id="loading">
    <div class="spinner"></div>
    <div id="load-msg">Loading...</div>
    <div id="load-bar-wrap"><div id="load-bar"></div></div>
  </div>
  <div id="light-panel">
    <div class="lp-title">Lighting</div>
    <div class="lp-row">
      <div class="lp-label"><span>Key</span><span id="v-key">80%</span></div>
      <input type="range" id="sl-key" min="0" max="200" value="80" oninput="setLight('key',this.value)">
    </div>
    <div class="lp-row">
      <div class="lp-label"><span>Fill</span><span id="v-fill">40%</span></div>
      <input type="range" id="sl-fill" min="0" max="200" value="40" oninput="setLight('fill',this.value)">
    </div>
    <div class="lp-row">
      <div class="lp-label"><span>Ambient</span><span id="v-amb">30%</span></div>
      <input type="range" id="sl-amb" min="0" max="100" value="30" oninput="setLight('amb',this.value)">
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>

const MODEL_URLS = {
  xbot: 'https://farbrorjannis.github.io/kroki3dmodell/xbot.glb',
  ybot: 'https://farbrorjannis.github.io/kroki3dmodell/ybot.glb',
};

const B = {
  hips: 'mixamorigHips', spine: 'mixamorigSpine', spine1: 'mixamorigSpine1', spine2: 'mixamorigSpine2',
  neck: 'mixamorigNeck', head: 'mixamorigHead', lArm: 'mixamorigLeftArm', rArm: 'mixamorigRightArm',
  lForeArm: 'mixamorigLeftForeArm', rForeArm: 'mixamorigRightForeArm', lHand: 'mixamorigLeftHand', 
  rHand: 'mixamorigRightHand', lUpLeg: 'mixamorigLeftUpLeg', rUpLeg: 'mixamorigRightUpLeg',
  lLeg: 'mixamorigLeftLeg', rLeg: 'mixamorigRightLeg', lFoot: 'mixamorigLeftFoot', rFoot: 'mixamorigRightFoot',
};

const POSES = {
  'T-Pose': {},
  'Standing': { [B.lArm]:{z:-10}, [B.rArm]:{z:10}, [B.lUpLeg]:{z:2}, [B.rUpLeg]:{z:-2} },
  'Sitting': { [B.hips]:{x:-10}, [B.lUpLeg]:{x:-90}, [B.rUpLeg]:{x:-90}, [B.lLeg]:{x:90}, [B.rLeg]:{x:90} },
  'Walking': { [B.lUpLeg]:{x:-30}, [B.rUpLeg]:{x:20}, [B.lArm]:{x:20}, [B.rArm]:{x:-30} },
  'Running': { [B.lUpLeg]:{x:-60}, [B.rUpLeg]:{x:40}, [B.lArm]:{x:40}, [B.rArm]:{x:-60}, [B.spine]:{x:15} },
  'Arms Up': { [B.lArm]:{z:-160}, [B.rArm]:{z:160} },
  'Crouching': { [B.lUpLeg]:{x:-120}, [B.rUpLeg]:{x:-120}, [B.lLeg]:{x:130}, [B.rLeg]:{x:130} },
  'Looking Down': { [B.neck]:{x:30}, [B.head]:{x:20} },
  'Kroki A': { [B.hips]:{y:0.1, z:10}, [B.spine]:{z:-10}, [B.lArm]:{x:30}, [B.rArm]:{x:-20} },
  'Kroki B': { [B.lUpLeg]:{x:-10, z:20}, [B.rUpLeg]:{x:10}, [B.spine]:{y:15} }
};

const canvas = document.getElementById('viewport');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x151008);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.set(0, 1.2, 4);

const ambLight = new THREE.AmbientLight(0xffffff, 0.3);
const keyLight = new THREE.DirectionalLight(0xffffff, 0.8);
keyLight.position.set(2, 4, 3);
keyLight.castShadow = true;
const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
fillLight.position.set(-2, 1, 2);
scene.add(ambLight, keyLight, fillLight);

const ground = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshStandardMaterial({ color: 0x222222 }));
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

const grid = new THREE.GridHelper(10, 20, 0x444444, 0x222222);
scene.add(grid);

let currentModel, bones = {}, currentPose = 'Standing', wireMode = false;
const loader = new THREE.GLTFLoader();

function loadModel(key) {
  const loadingEl = document.getElementById('loading');
  loadingEl.classList.remove('hidden');
  if (currentModel) scene.remove(currentModel);
  bones = {};

  loader.load(MODEL_URLS[key], (gltf) => {
    currentModel = gltf.scene;

    // FORCE STANDING: Mixamo GLBs ofta kräver -90 grader på X
    currentModel.rotation.set(0,0,0); 
    currentModel.rotateX(-Math.PI / 2);

    currentModel.traverse(child => {
      if (child.isBone) bones[child.name] = child;
      if (child.isMesh) {
        child.castShadow = child.receiveShadow = true;
        if (child.material) {
          child.material.side = THREE.DoubleSide;
          child.userData._mat = child.material;
        }
      }
    });

    // Centrera och sätt på marken
    const box = new THREE.Box3().setFromObject(currentModel);
    const size = box.getSize(new THREE.Vector3());
    const scale = 1.75 / size.y;
    currentModel.scale.setScalar(scale);
    
    // Räkna om box efter skalning
    const newBox = new THREE.Box3().setFromObject(currentModel);
    currentModel.position.y = -newBox.min.y;

    scene.add(currentModel);
    applyPose(currentPose);
    loadingEl.classList.add('hidden');
  }, 
  (p) => { document.getElementById('load-bar').style.width = (p.loaded/p.total*100)+'%'; });
}

function applyPose(name) {
  currentPose = name;
  Object.values(bones).forEach(b => b.rotation.set(0, 0, 0));
  const pose = POSES[name] || {};
  for (const [bone, rot] of Object.entries(pose)) {
    if (bones[bone]) {
      bones[bone].rotation.x = (rot.x || 0) * (Math.PI/180);
      bones[bone].rotation.y = (rot.y || 0) * (Math.PI/180);
      bones[bone].rotation.z = (rot.z || 0) * (Math.PI/180);
    }
  }
  document.querySelectorAll('.pose-btn').forEach(b => b.classList.toggle('active', b.dataset.pose === name));
}

function switchModel(key, btn) {
  document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadModel(key);
}

const pBtns = document.getElementById('poseBtns');
Object.keys(POSES).forEach(name => {
  const b = document.createElement('button');
  b.className = 'pose-btn';
  b.textContent = name;
  b.dataset.pose = name;
  b.onclick = () => applyPose(name);
  pBtns.appendChild(b);
});

let orb = { r: 4, t: 0, p: 0.2 }, drag = false;
canvas.onmousedown = (e) => { if(e.button === 0) drag = true; };
window.onmouseup = () => drag = false;
window.onmousemove = (e) => {
  if (drag) { orb.t -= e.movementX * 0.01; orb.p = Math.max(-0.4, Math.min(1.2, orb.p + e.movementY * 0.01)); updateCam(); }
};
canvas.onwheel = (e) => { orb.r = Math.max(1, Math.min(10, orb.r + e.deltaY * 0.005)); updateCam(); };

function updateCam() {
  camera.position.set(orb.r * Math.sin(orb.t) * Math.cos(orb.p), orb.r * Math.sin(orb.p) + 1.1, orb.r * Math.cos(orb.t) * Math.cos(orb.p));
  camera.lookAt(0, 1.1, 0);
}

function toggleLightPanel() { document.getElementById('light-panel').classList.toggle('open'); }
function setLight(t, v) { 
  const val = v/100;
  if(t==='key') keyLight.intensity=val; if(t==='fill') fillLight.intensity=val; if(t==='amb') ambLight.intensity=val;
}
function toggleWire() {
  wireMode = !wireMode;
  currentModel.traverse(c => { if(c.isMesh) c.material = wireMode ? new THREE.MeshBasicMaterial({wireframe:true, color:0x00ff00}) : c.userData._mat; });
}
function toggleBg() { scene.background.set(scene.background.getHex() === 0x151008 ? 0xdddddd : 0x151008); }
function toggleGrid() { grid.visible = !grid.visible; }
function saveSnap() { renderer.render(scene, camera); const a = document.createElement('a'); a.href = canvas.toDataURL(); a.download = 'pose.png'; a.click(); }

function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
window.onresize = () => { renderer.setSize(canvas.clientWidth, canvas.clientHeight, false); camera.aspect = canvas.clientWidth/canvas.clientHeight; camera.updateProjectionMatrix(); };

window.onresize();
updateCam();
animate();
loadModel('xbot');

</script>
</body>
</html>
